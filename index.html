<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI History Viewer · Claude 聊天记录还原器</title>
<style>
  :root {
    --bg:#f5f5f4; --panel:#fff; --border:#e7e5e4; --text:#1c1917; --muted:#78716c;
    --human:#eff6ff; --human-bd:#cfe0f7; --assist:#faf9f7; --assist-bd:#ececec;
    --tool:#f3f4f6; --tool-bd:#e0e2e6; --accent:#b45309; --code-bg:#f4f2ef; --mark:#fde68a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1c1917; --panel:#292524; --border:#3f3b38; --text:#f5f5f4; --muted:#a8a29e;
      --human:#1c2836; --human-bd:#2f4a6d; --assist:#252220; --assist-bd:#3f3b38;
      --tool:#232a25; --tool-bd:#374034; --accent:#f59e0b; --code-bg:#1a1815; --mark:#78621f;
    }
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    font:15px/1.65 -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh;
  }
  header {
    padding:10px 16px; border-bottom:1px solid var(--border); background:var(--panel);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  header h1 { font-size:15px; margin:0; font-weight:600; white-space:nowrap; }
  header .sub { color:var(--muted); font-size:12px; }
  header .grow { flex:1; }
  #search {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    background:var(--bg); color:var(--text); font-size:14px; min-width:220px;
  }
  .filechip {
    display:inline-block; padding:6px 12px; border-radius:6px; background:var(--accent);
    color:#fff; cursor:pointer; font-weight:600; font-size:13px;
  }
  .filechip input { display:none; }
  #main { display:flex; flex:1; min-height:0; }
  #list { width:310px; border-right:1px solid var(--border); overflow-y:auto; background:var(--panel); flex-shrink:0; }
  #list .filters { display:flex; gap:6px; padding:8px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); }
  .chip { font-size:12px; padding:3px 9px; border:1px solid var(--border); border-radius:99px; cursor:pointer; color:var(--muted); }
  .chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .item { padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
  .item:hover { background:var(--bg); }
  .item.active { background:var(--human); }
  .item .row1 { display:flex; align-items:center; gap:6px; }
  .item .badge { font-size:10px; padding:1px 6px; border-radius:99px; font-weight:700; flex-shrink:0; }
  .badge.web { background:#dbeafe; color:#1e40af; }
  .badge.code { background:#dcfce7; color:#166534; }
  @media (prefers-color-scheme: dark) {
    .badge.web { background:#1e3a5f; color:#bfdbfe; } .badge.code { background:#14432a; color:#bbf7d0; }
  }
  .item .t { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item .m { color:var(--muted); font-size:12px; margin-top:2px; }
  .item .snip { color:var(--muted); font-size:12px; margin-top:3px; line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .item mark, .body mark { background:var(--mark); color:inherit; border-radius:2px; padding:0 1px; }
  #view { flex:1; overflow-y:auto; padding:22px 26px; min-width:0; }
  #view h2.conv-title { font-size:19px; margin:0 0 3px; }
  #view .conv-meta { color:var(--muted); font-size:12px; margin-bottom:20px; }
  .toolbar { margin-bottom:16px; }
  .toolbar button { padding:6px 12px; border:1px solid var(--border); border-radius:6px;
    background:var(--panel); color:var(--text); cursor:pointer; font-size:13px; }
  .toolbar button:hover { border-color:var(--accent); color:var(--accent); }
  .msg { margin:0 0 14px; border:1px solid; border-radius:10px; padding:10px 15px; max-width:820px; }
  .msg.human { background:var(--human); border-color:var(--human-bd); }
  .msg.assistant { background:var(--assist); border-color:var(--assist-bd); }
  .msg.tool { background:var(--tool); border-color:var(--tool-bd); }
  .msg .who { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--accent); margin-bottom:6px; }
  .body { word-wrap:break-word; overflow-wrap:anywhere; }
  .body > *:first-child { margin-top:0; } .body > *:last-child { margin-bottom:0; }
  .body h1,.body h2,.body h3,.body h4,.body h5,.body h6 { margin:14px 0 6px; line-height:1.3; }
  .body h1 { font-size:1.4em; } .body h2 { font-size:1.25em; } .body h3 { font-size:1.12em; }
  .body p { margin:8px 0; } .body ul,.body ol { margin:8px 0; padding-left:22px; }
  .body li { margin:2px 0; }
  .body blockquote { margin:8px 0; padding:2px 12px; border-left:3px solid var(--border); color:var(--muted); }
  .body a { color:var(--accent); }
  .body code { background:var(--code-bg); padding:1px 5px; border-radius:4px;
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  .body pre, .msg pre { position:relative; background:var(--code-bg); border:1px solid var(--border);
    border-radius:8px; padding:11px 13px; overflow-x:auto; margin:10px 0; }
  .body pre code, .msg pre code { background:none; padding:0; font-size:12.5px; }
  .msg pre { font:12.5px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  pre .copy { position:absolute; top:6px; right:6px; font-size:11px; padding:2px 8px;
    border:1px solid var(--border); border-radius:5px; background:var(--panel); color:var(--muted);
    cursor:pointer; opacity:0; transition:opacity .12s; }
  pre:hover .copy { opacity:1; }
  .body table { border-collapse:collapse; margin:10px 0; display:block; overflow-x:auto; }
  .body th,.body td { border:1px solid var(--border); padding:5px 10px; text-align:left; }
  .body th { background:var(--code-bg); }
  .body hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
  details.blk { margin:8px 0; border:1px dashed var(--border); border-radius:8px; padding:0 10px; }
  details.blk > summary { cursor:pointer; padding:7px 0; font-size:12.5px; color:var(--muted); font-weight:600; }
  details.blk[open] > summary { margin-bottom:6px; border-bottom:1px solid var(--border); }
  details.blk.result.err > summary { color:#dc2626; }
  details.blk .body { padding-bottom:8px; }
  .att { margin-top:7px; font-size:12px; color:var(--muted); }
  .drop { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
    text-align:center; color:var(--muted); padding:40px; }
  .drop .big { font-size:44px; } .drop b { color:var(--text); }
  .drop .fmts { margin-top:10px; font-size:12.5px; max-width:440px; }
  #empty { color:var(--muted); text-align:center; margin-top:56px; }
  .err-box { max-width:620px; margin:12px auto; padding:12px 16px; border:1px solid #f0b4b4;
    background:#fdecec; color:#7f1d1d; border-radius:8px; font-size:13px; }
  @media (prefers-color-scheme: dark) { .err-box { background:#3a1f1f; border-color:#5f2f2f; color:#fca5a5; } }
</style>
</head>
<body>
<header>
  <h1>AI History Viewer</h1>
  <span class="sub" id="counts">Claude 网页导出 + Claude Code 日志</span>
  <span class="grow"></span>
  <input id="search" type="search" placeholder="搜索标题和正文…" hidden>
  <label class="filechip">
    + 加载文件
    <input id="file" type="file" accept=".json,.jsonl,application/json" multiple>
  </label>
</header>
<div id="main">
  <div id="list"></div>
  <div id="view">
    <div class="drop" id="drop">
      <div class="big">💬</div>
      <p>把 <b>conversations.json</b> 或 Claude Code 的 <b>.jsonl</b> 拖进来<br>(可多选、可混合)</p>
      <div class="fmts">
        全程在本机浏览器解析,<b>不联网、不上传</b>。<br>
        Claude Code 日志通常在 <code>~/.claude/projects/&lt;项目&gt;/&lt;会话&gt;.jsonl</code>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  'use strict';

  /* ---------- utils ---------- */
  var uidc = 0;
  function uid(){ return 'c' + (++uidc); }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function reEsc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function fmt(d){
    if(!d) return ''; var t = new Date(d); if(isNaN(t)) return '';
    var p = function(n){ return String(n).padStart(2,'0'); };
    return t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes());
  }
  function highlight(text, q){
    var e = escapeHtml(text);
    if(!q) return e;
    return e.replace(new RegExp(reEsc(escapeHtml(q)),'gi'), function(m){ return '<mark>'+m+'</mark>'; });
  }

  /* ---------- mini markdown (XSS-safe: escape first, then structure) ---------- */
  function inline(escaped){
    var codes = [];
    var s = escaped.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return '␀'+(codes.length-1)+'␀'; });
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(m,t,u){
      var url = u.replace(/&amp;/g,'&');
      if(/^https?:\/\//i.test(url) || /^mailto:/i.test(url))
        return '<a href="'+escapeHtml(url)+'" target="_blank" rel="noopener noreferrer">'+t+'</a>';
      return m;
    });
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/__([^_]+)__/g,'<strong>$1</strong>');
    s = s.replace(/(^|[^*\w])\*([^*\n]+)\*/g,'$1<em>$2</em>');
    s = s.replace(/(^|[^_\w])_([^_\n]+)_/g,'$1<em>$2</em>');
    s = s.replace(/~~([^~]+)~~/g,'<del>$1</del>');
    s = s.replace(/\n/g,'<br>');
    s = s.replace(/␀(\d+)␀/g, function(m,i){ return '<code>'+codes[i]+'</code>'; });
    return s;
  }
  function splitRow(line){ return line.trim().replace(/^\||\|$/g,'').split('|').map(function(x){ return x.trim(); }); }
  function md(src){
    if(src == null) return '';
    var lines = String(src).replace(/\r\n?/g,'\n').split('\n');
    var out = '', i = 0;
    while(i < lines.length){
      var line = lines[i];
      var fence = line.match(/^```(.*)$/);
      if(fence){
        var lang = fence[1].trim(), buf = []; i++;
        while(i < lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;
        out += '<pre'+(lang?' data-lang="'+escapeHtml(lang)+'"':'')+'><code>'+escapeHtml(buf.join('\n'))+'</code></pre>';
        continue;
      }
      var h = line.match(/^(#{1,6})\s+(.*)$/);
      if(h){ var lv=h[1].length; out+='<h'+lv+'>'+inline(escapeHtml(h[2]))+'</h'+lv+'>'; i++; continue; }
      if(/^\s*([-*_])\1\1+\s*$/.test(line)){ out+='<hr>'; i++; continue; }
      if(/^>\s?/.test(line)){
        var bq=[]; while(i<lines.length && /^>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^>\s?/,'')); i++; }
        out += '<blockquote>'+md(bq.join('\n'))+'</blockquote>'; continue;
      }
      if(/\|/.test(line) && lines[i+1] && /^[\s|:\-]+$/.test(lines[i+1]) && lines[i+1].indexOf('-')>=0){
        var header = splitRow(line); i += 2; var rows = [];
        while(i<lines.length && lines[i].indexOf('|')>=0 && lines[i].trim()!==''){ rows.push(splitRow(lines[i])); i++; }
        var t = '<table><thead><tr>'+header.map(function(c){ return '<th>'+inline(escapeHtml(c))+'</th>'; }).join('')+'</tr></thead><tbody>';
        rows.forEach(function(r){ t += '<tr>'+r.map(function(c){ return '<td>'+inline(escapeHtml(c))+'</td>'; }).join('')+'</tr>'; });
        out += t+'</tbody></table>'; continue;
      }
      if(/^\s*([-*+]|\d+\.)\s+/.test(line)){
        var ordered = /^\s*\d+\.\s+/.test(line), items = [];
        var startAt = ordered ? (line.match(/^\s*(\d+)\./)||[])[1] : null;
        while(i<lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])){
          items.push(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/,'')); i++;
        }
        var tag = ordered?'ol':'ul';
        var attr = (ordered && startAt && startAt !== '1') ? ' start="'+startAt+'"' : '';
        out += '<'+tag+attr+'>'+items.map(function(it){ return '<li>'+inline(escapeHtml(it))+'</li>'; }).join('')+'</'+tag+'>';
        continue;
      }
      if(/^\s*$/.test(line)){ i++; continue; }
      var para = [line]; i++;
      while(i<lines.length && !/^\s*$/.test(lines[i])
            && !/^(```|#{1,6}\s|>\s?)/.test(lines[i])
            && !/^\s*([-*+]|\d+\.)\s+/.test(lines[i])
            && !/^\s*([-*_])\1\1+\s*$/.test(lines[i])){ para.push(lines[i]); i++; }
      out += '<p>'+inline(escapeHtml(para.join('\n')))+'</p>';
    }
    return out;
  }

  /* ---------- parsers ---------- */
  function finalize(conv){
    conv.id = uid();
    conv._plain = conv.messages.map(function(m){
      return m.parts.map(function(p){ return p.text || ''; }).join(' ');
    }).join('  ');
    conv._search = conv._plain.toLowerCase();
    return conv;
  }

  // claude.ai data export: array of { name, created_at, chat_messages:[{sender,text,content,attachments}] }
  function parseClaudeWebConv(c){
    if(!c || typeof c !== 'object') return null;
    var raw = c.chat_messages || c.messages || [];
    var msgs = raw.map(function(m){
      var role = String(m.sender || m.role || '').toLowerCase();
      var sender = (role==='human'||role==='user') ? 'human' : (role==='assistant' ? 'assistant' : (role||'assistant'));
      var parts = [];
      if(Array.isArray(m.content) && m.content.length){
        m.content.forEach(function(b){
          if(b == null) return;
          if(typeof b === 'string'){ parts.push({type:'text', text:b}); return; }
          if(b.type==='text' && b.text!=null) parts.push({type:'text', text:b.text});
          else if(b.text != null) parts.push({type:'text', text:b.text});
          else if(b.type==='tool_use') parts.push({type:'tool_use', name:b.name, input:b.input});
          else if(b.type) parts.push({type:'text', text:'['+b.type+']'});
        });
      }
      if(!parts.length && m.text) parts.push({type:'text', text:m.text});
      (m.attachments||[]).forEach(function(a){ parts.push({type:'attach', text:(a.file_name||a.name||'附件')}); });
      (m.files||[]).forEach(function(f){ parts.push({type:'attach', text:(f.file_name||f.name||'文件')}); });
      return { sender:sender, created_at:m.created_at||'', parts:parts };
    }).filter(function(m){ return m.parts.length; });
    return finalize({ source:'claude-web', title:c.name||c.title||'(无标题对话)',
                      created_at:c.created_at||c.created||'', messages:msgs });
  }

  function extractToolResult(content){
    if(content == null) return '';
    if(typeof content === 'string') return content;
    if(Array.isArray(content)) return content.map(function(c){
      return typeof c==='string' ? c : (c.text || ('['+(c.type||'block')+']')); }).join('\n');
    if(content.text) return content.text;
    try { return JSON.stringify(content, null, 2); } catch(e){ return String(content); }
  }

  // Claude Code JSONL: one file = one session, one JSON object per line
  function parseClaudeCodeSession(name, objs){
    var title = '', created = '', msgs = [];
    objs.forEach(function(o){
      if(!o || typeof o !== 'object') return;
      if(o.isMeta === true) return;
      if(o.type === 'summary'){ if(o.summary && !title) title = o.summary; return; }
      if(o.type === 'system') return;
      var msg = o.message; if(!msg) return;
      if(!created && o.timestamp) created = o.timestamp;
      var role = String(msg.role || o.type || '').toLowerCase();
      var content = msg.content, parts = [], sawResult = false, sawOther = false;
      if(typeof content === 'string'){
        if(content.trim()){ parts.push({type:'text', text:content}); sawOther = true; }
      } else if(Array.isArray(content)){
        content.forEach(function(b){
          if(!b) return;
          switch(b.type){
            case 'text': if(b.text!=null){ parts.push({type:'text', text:b.text}); sawOther=true; } break;
            case 'thinking': parts.push({type:'thinking', text:b.thinking||b.text||''}); sawOther=true; break;
            case 'tool_use': parts.push({type:'tool_use', name:b.name, input:b.input}); sawOther=true; break;
            case 'tool_result': parts.push({type:'tool_result', text:extractToolResult(b.content), isError:!!b.is_error}); sawResult=true; break;
            case 'image': parts.push({type:'image', alt:'图片'}); sawOther=true; break;
            default: if(b.text!=null){ parts.push({type:'text', text:b.text}); sawOther=true; }
          }
        });
      }
      if(!parts.length) return;
      var sender = role==='assistant' ? 'assistant'
                 : role==='user' ? ((sawResult && !sawOther) ? 'tool' : 'human')
                 : 'assistant';
      if(!title && sender==='human'){
        var ft = parts.find(function(p){ return p.type==='text'; });
        if(ft) title = ft.text.slice(0,60).replace(/\n/g,' ');
      }
      msgs.push({ sender:sender, created_at:o.timestamp||'', parts:parts, model:msg.model||'' });
    });
    if(!title) title = name.replace(/\.jsonl$/i,'');
    return finalize({ source:'claude-code', title:title, created_at:created, messages:msgs });
  }

  function parseJsonl(name, text){
    var lines = text.split('\n').map(function(s){ return s.trim(); }).filter(Boolean);
    var objs = [];
    lines.forEach(function(ln){ try { objs.push(JSON.parse(ln)); } catch(e){} });
    if(!objs.length) throw new Error('无法解析:既不是有效 JSON,也不是有效 JSONL。');
    return [parseClaudeCodeSession(name, objs)];
  }

  function parseJson(name, data){
    var arr = Array.isArray(data) ? data
            : (data && Array.isArray(data.conversations)) ? data.conversations
            : (data && Array.isArray(data.data)) ? data.data
            : (data && (data.chat_messages || data.name)) ? [data] : null;
    if(!arr) throw new Error('这个 JSON 不是预期的对话结构(找不到对话数组)。');
    if(!arr.length) return [];
    var first = arr[0] || {};
    if(first.mapping && !first.chat_messages)
      throw new Error('检测到 ChatGPT 导出(节点树 mapping 格式),当前版本暂不支持——已列入 roadmap。');
    return arr.map(parseClaudeWebConv).filter(Boolean);
  }

  function detectAndParse(name, text){
    if(/\.jsonl$/i.test(name)) return parseJsonl(name, text);
    var data;
    try { data = JSON.parse(text); }
    catch(e){ return parseJsonl(name, text); }   // extensionless jsonl fallback
    return parseJson(name, data);
  }

  /* ---------- state + rendering ---------- */
  var convos = [], activeId = null, query = '', sourceFilter = 'all';
  var listEl = document.getElementById('list');
  var viewEl = document.getElementById('view');
  var dropEl = document.getElementById('drop');
  var searchEl = document.getElementById('search');
  var countsEl = document.getElementById('counts');

  function label(s){ return s==='human'?'我' : s==='assistant'?'Claude' : s==='tool'?'工具结果' : s; }

  function visibleConvos(){
    var q = query.toLowerCase();
    return convos.filter(function(c){
      if(sourceFilter!=='all' && c.source!==sourceFilter) return false;
      if(!q) return true;
      return c.title.toLowerCase().indexOf(q)>=0 || c._search.indexOf(q)>=0;
    });
  }

  function snippetFor(c, q){
    if(!q) return '';
    var lc = c._search, i = lc.indexOf(q);
    if(i < 0) return '';
    var s = Math.max(0, i-24);
    var frag = c._plain.slice(s, i + q.length + 46).replace(/\s+/g,' ').trim();
    return (s>0?'…':'') + frag + '…';
  }

  function renderFilters(){
    var counts = { all:convos.length, 'claude-web':0, 'claude-code':0 };
    convos.forEach(function(c){ counts[c.source] = (counts[c.source]||0)+1; });
    var defs = [['all','全部',counts.all],['claude-web','网页',counts['claude-web']],['claude-code','Code',counts['claude-code']]];
    var box = document.createElement('div'); box.className='filters';
    defs.forEach(function(d){
      var el = document.createElement('span');
      el.className = 'chip' + (sourceFilter===d[0]?' on':'');
      el.textContent = d[1]+' '+d[2];
      el.onclick = function(){ sourceFilter=d[0]; renderList(); };
      box.appendChild(el);
    });
    return box;
  }

  function renderList(){
    listEl.innerHTML = '';
    if(convos.length) listEl.appendChild(renderFilters());
    var q = query.toLowerCase();
    var vis = visibleConvos();
    if(!vis.length && convos.length){
      var none = document.createElement('div'); none.className='item'; none.style.cursor='default';
      none.innerHTML = '<div class="m">没有匹配的对话</div>'; listEl.appendChild(none); return;
    }
    vis.forEach(function(c){
      var d = document.createElement('div');
      d.className = 'item' + (c.id===activeId?' active':'');
      var badge = c.source==='claude-code' ? '<span class="badge code">Code</span>' : '<span class="badge web">网页</span>';
      var snip = snippetFor(c, q);
      d.innerHTML = '<div class="row1">'+badge+'<span class="t">'+highlight(c.title,q)+'</span></div>'
        + '<div class="m">'+fmt(c.created_at)+' · '+c.messages.length+' 条消息</div>'
        + (snip ? '<div class="snip">'+highlight(snip,q)+'</div>' : '');
      d.onclick = function(){ activeId = c.id; renderList(); renderView(); };
      listEl.appendChild(d);
    });
  }

  function renderMessage(m){
    var box = document.createElement('div');
    box.className = 'msg ' + (['human','assistant','tool'].indexOf(m.sender)>=0 ? m.sender : 'assistant');
    var who = document.createElement('div'); who.className='who';
    who.textContent = label(m.sender) + (m.model?' · '+m.model:'') + (m.created_at?'  ·  '+fmt(m.created_at):'');
    box.appendChild(who);
    m.parts.forEach(function(p){
      if(p.type==='text'){
        var d = document.createElement('div'); d.className='body'; d.innerHTML = md(p.text||''); box.appendChild(d);
      } else if(p.type==='thinking'){
        var det = document.createElement('details'); det.className='blk thinking';
        det.innerHTML = '<summary>💭 thinking</summary>';
        var b = document.createElement('div'); b.className='body'; b.innerHTML = md(p.text||''); det.appendChild(b);
        box.appendChild(det);
      } else if(p.type==='tool_use'){
        var det2 = document.createElement('details'); det2.className='blk tool';
        det2.innerHTML = '<summary>🔧 '+escapeHtml(p.name||'tool')+'</summary>';
        var pre = document.createElement('pre'); var code = document.createElement('code');
        code.textContent = (typeof p.input==='string') ? p.input : JSON.stringify(p.input, null, 2);
        pre.appendChild(code); det2.appendChild(pre); box.appendChild(det2);
      } else if(p.type==='tool_result'){
        var det3 = document.createElement('details'); det3.className='blk result'+(p.isError?' err':'');
        det3.innerHTML = '<summary>'+(p.isError?'⚠ 工具结果(错误)':'↳ 工具结果')+'</summary>';
        var b3 = document.createElement('div'); b3.className='body'; b3.innerHTML = md(p.text||''); det3.appendChild(b3);
        box.appendChild(det3);
      } else if(p.type==='image'){
        var im = document.createElement('div'); im.className='att'; im.textContent='🖼️ '+(p.alt||'图片(导出未含原图)'); box.appendChild(im);
      } else if(p.type==='attach'){
        var at = document.createElement('div'); at.className='att'; at.textContent='📎 '+p.text; box.appendChild(at);
      }
    });
    return box;
  }

  var renderToken = 0;
  function addCopyButtons(root){
    root.querySelectorAll('pre').forEach(function(pre){
      if(pre.querySelector('.copy')) return;
      var b = document.createElement('button'); b.className='copy'; b.type='button'; b.textContent='复制';
      pre.appendChild(b);
    });
  }
  function renderView(){
    var c = convos.find(function(x){ return x.id===activeId; });
    var token = ++renderToken;   // 任何进行中的分片渲染就此作废
    if(!c){ viewEl.innerHTML = '<div id="empty">← 从左边选一段对话</div>'; return; }
    viewEl.innerHTML = '';
    var bar = document.createElement('div'); bar.className='toolbar';
    var btn = document.createElement('button'); btn.type='button'; btn.textContent='⬇ 导出这段为 Markdown';
    btn.onclick = function(){ exportMd(c); }; bar.appendChild(btn);
    var h = document.createElement('h2'); h.className='conv-title'; h.textContent = c.title;
    var meta = document.createElement('div'); meta.className='conv-meta';
    meta.textContent = (c.source==='claude-code'?'Claude Code':'Claude 网页') + ' · ' + fmt(c.created_at) + ' · 共 ' + c.messages.length + ' 条消息';
    viewEl.appendChild(bar); viewEl.appendChild(h); viewEl.appendChild(meta);
    viewEl.scrollTop = 0;
    // 分片渲染:大会话不会把主线程一次性冻死,每帧只处理一批
    var msgs = c.messages, n = msgs.length, CHUNK = 40, idx = 0;
    (function step(){
      if(token !== renderToken) return;   // 已切到别的对话,停止本次渲染
      var frag = document.createDocumentFragment();
      var end = Math.min(idx + CHUNK, n);
      for(; idx < end; idx++){ var el = renderMessage(msgs[idx]); addCopyButtons(el); frag.appendChild(el); }
      viewEl.appendChild(frag);
      if(idx < n) requestAnimationFrame(step);
    })();
  }

  function exportMd(c){
    var lines = ['# '+c.title, '', '_'+ (c.source==='claude-code'?'Claude Code':'Claude 网页') +' · '+fmt(c.created_at)+'_', ''];
    c.messages.forEach(function(m){
      lines.push('## '+label(m.sender)+(m.model?' ('+m.model+')':''));
      lines.push('');
      m.parts.forEach(function(p){
        if(p.type==='text') lines.push(p.text||'');
        else if(p.type==='thinking') lines.push('> 💭 '+(p.text||'').replace(/\n/g,'\n> '));
        else if(p.type==='tool_use') lines.push('```json\n// 🔧 '+(p.name||'tool')+'\n'+(typeof p.input==='string'?p.input:JSON.stringify(p.input,null,2))+'\n```');
        else if(p.type==='tool_result') lines.push('```\n// ↳ 工具结果\n'+(p.text||'')+'\n```');
        else if(p.type==='attach') lines.push('> 📎 '+p.text);
        else if(p.type==='image') lines.push('> 🖼️ '+(p.alt||'图片'));
        lines.push('');
      });
    });
    var blob = new Blob([lines.join('\n')], {type:'text/markdown'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (c.title||'conversation').replace(/[\/\\:*?"<>|]/g,'_').slice(0,80)+'.md';
    a.click();
  }

  function updateCounts(){
    if(!convos.length){ countsEl.textContent = 'Claude 网页导出 + Claude Code 日志'; return; }
    var w=0,cc=0; convos.forEach(function(c){ c.source==='claude-code'?cc++:w++; });
    countsEl.textContent = '共 '+convos.length+' 段对话(网页 '+w+' · Code '+cc+')';
  }

  /* ---------- loading ---------- */
  function showError(msg){
    var box = document.createElement('div'); box.className='err-box'; box.textContent = '⚠ '+msg;
    if(dropEl && dropEl.parentNode){ dropEl.appendChild(box); }
    else { viewEl.insertBefore(box, viewEl.firstChild); }
  }

  function ingest(name, text){
    var parsed;
    try { parsed = detectAndParse(name, text); }
    catch(e){ showError(name+':'+(e.message||e)); return 0; }
    if(parsed) parsed = parsed.filter(function(c){ return c.messages.length; });
    if(!parsed || !parsed.length){ showError(name+':解析成功但没有对话内容。'); return 0; }
    parsed.forEach(function(c){ convos.push(c); });
    return parsed.length;
  }

  function afterLoad(added){
    if(!convos.length) return;
    if(dropEl && dropEl.parentNode) dropEl.remove();
    searchEl.hidden = false;
    convos.sort(function(a,b){ return (+new Date(b.created_at) || 0) - (+new Date(a.created_at) || 0); });
    if(!activeId || !convos.find(function(c){ return c.id===activeId; })) activeId = convos[0].id;
    updateCounts(); renderList(); renderView();
  }

  function readFiles(fileList){
    var files = Array.prototype.slice.call(fileList||[]);
    if(!files.length) return;
    var pending = files.length, total = 0;
    files.forEach(function(f){
      var r = new FileReader();
      r.onload = function(){ total += ingest(f.name, r.result); if(--pending===0) afterLoad(total); };
      r.onerror = function(){ showError(f.name+':读取失败。'); if(--pending===0) afterLoad(total); };
      r.readAsText(f);
    });
  }

  document.getElementById('file').onchange = function(){ readFiles(this.files); this.value=''; };
  searchEl.oninput = function(){ query = searchEl.value.trim(); renderList(); };

  ['dragover','dragenter'].forEach(function(ev){
    document.body.addEventListener(ev, function(e){ e.preventDefault(); });
  });
  document.body.addEventListener('drop', function(e){
    e.preventDefault();
    if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) readFiles(e.dataTransfer.files);
  });

  // copy-button delegation (works for all <pre>)
  viewEl.addEventListener('click', function(e){
    if(!e.target.classList || !e.target.classList.contains('copy')) return;
    var pre = e.target.closest('pre'); if(!pre) return;
    var code = pre.querySelector('code');
    var txt = code ? code.textContent : pre.textContent;
    var btn = e.target;
    var done = function(ok){ btn.textContent = ok?'已复制':'复制失败'; setTimeout(function(){ btn.textContent='复制'; },1200); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){ done(true); }, function(){ done(false); });
    } else {
      try {
        var ta = document.createElement('textarea'); ta.value = txt;
        ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(true);
      } catch(err){ done(false); }
    }
  });

  // expose for automated tests
  window.__viewer = { detectAndParse:detectAndParse, md:md, get convos(){ return convos; } };
})();
</script>
